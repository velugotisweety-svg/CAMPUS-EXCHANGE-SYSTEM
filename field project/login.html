<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Campus Exchange</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <span class="white">CAMPUS</span>
      <span class="green">EXCHANGE</span>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="signup.html">Sign Up</a>
    </nav>
  </header>

  <!-- LOGIN SECTION -->
  <section class="form-container">
    <h1>
      SIGN <span class="green">IN</span>
    </h1>
    <p class="subtitle">
      Access your Campus Exchange account
    </p>

    <form class="auth-form" onsubmit="loginUser(event)">
      <input type="email" placeholder="Email address" required>
      <input type="password" placeholder="Password" required>

      <button type="submit" class="primary-btn full-width">
        SIGN IN
      </button>
    </form>

    <p class="switch-text">
      Don’t have an account?
      <a href="signup.html">Sign Up</a>
    </p>
  </section>

  <script>
function loginUser(e) {
  e.preventDefault();

  const email = document.querySelector('input[type="email"]').value;
  const password = document.querySelector('input[type="password"]').value;

  fetch('http://127.0.0.1:5000/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      email: email,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.message) {
      alert("Login Successful 🎉");
      window.location.href = "categories.html";
    } else {
      alert(data.error);
    }
  })
  .catch(err => {
    alert("Server error");
    console.log(err);
  });
}
</script>
</body>
</html>
